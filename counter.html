<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카운터 앱</title>
    <!-- TailwindCSS CDN을 추가합니다 -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <!-- 전체 페이지를 중앙에 배치하고 배경색을 설정합니다 -->
    <div class="min-h-screen bg-gray-100 flex items-center justify-center">
        <!-- 카운터 앱의 메인 컨테이너 -->
        <div class="bg-white rounded-lg shadow-lg p-8 w-full max-w-md">
            <!-- 제목 -->
            <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">
                카운터 앱
            </h1>

            <!-- 카운트 숫자를 표시하는 영역 -->
            <div class="bg-gradient-to-r from-blue-50 to-blue-100 rounded-lg p-8 mb-8 text-center">
                <p class="text-gray-600 text-sm mb-2">현재 카운트</p>
                <p id="counter" class="text-6xl font-bold text-blue-600">
                    0
                </p>
            </div>

            <!-- 버튼들을 감싸는 컨테이너 -->
            <div class="flex gap-4 mb-4">
                <!-- 감소 버튼 (-1) -->
                <button
                    onclick="decreaseCounter()"
                    class="flex-1 bg-blue-500 hover:bg-blue-600 active:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-105 active:scale-95"
                >
                    - 1
                </button>

                <!-- 증가 버튼 (+1) -->
                <button
                    onclick="increaseCounter()"
                    class="flex-1 bg-blue-500 hover:bg-blue-600 active:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-105 active:scale-95"
                >
                    + 1
                </button>
            </div>

            <!-- 리셋 버튼 -->
            <button
                onclick="resetCounter()"
                class="w-full bg-blue-400 hover:bg-blue-500 active:bg-blue-600 text-white font-bold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-105 active:scale-95"
            >
                리셋
            </button>
        </div>
    </div>

    <script>
        // 카운터 값을 저장하는 변수
        let count = 0;

        // 카운터를 증가시키는 함수
        function increaseCounter() {
            count++;  // count를 1 증가
            updateDisplay();  // 화면에 새로운 값을 표시
        }

        // 카운터를 감소시키는 함수
        function decreaseCounter() {
            count--;  // count를 1 감소
            updateDisplay();  // 화면에 새로운 값을 표시
        }

        // 카운터를 0으로 초기화하는 함수
        function resetCounter() {
            count = 0;  // count를 0으로 설정
            updateDisplay();  // 화면에 새로운 값을 표시
        }

        // HTML에 표시된 숫자를 업데이트하는 함수
        function updateDisplay() {
            // id가 "counter"인 요소를 찾아서 현재 count 값으로 업데이트
            document.getElementById('counter').textContent = count;
        }
    </script>
</body>
</html>
